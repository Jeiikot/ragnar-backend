services:
  ragnar:
    build: .
    ports:
      - "8765:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/chroma_data
    env_file:
      - path: .env
        required: false
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
    restart: unless-stopped

volumes:
  chroma_data:
